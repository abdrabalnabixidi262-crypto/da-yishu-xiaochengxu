<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>向村行·浙里三村志</title>
    <link rel="preload" href="./assets/fonts/MaShanZheng.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>

    <main class="device" aria-label="向村行·浙里三村志">
      <header class="ios-bar">
        <span>20:26</span>
        <span class="dynamic-island"></span>
        <span>5G ◔</span>
      </header>

      <section id="app" class="screen"></section>

      <nav class="dock" aria-label="底部导航">
        <button class="dock-item is-active" type="button" data-route="home">
          <span class="dock-icon"><img src="./assets/ui/dock-home.png" alt="" /></span>
          <span>今日</span>
        </button>
        <button class="dock-item" type="button" data-route="villages">
          <span class="dock-icon"><img src="./assets/ui/dock-villages.png" alt="" /></span>
          <span>村志</span>
        </button>
        <button class="dock-item" type="button" data-route="game">
          <span class="dock-icon"><img src="./assets/ui/dock-collect.png" alt="" /></span>
          <span>收集</span>
        </button>
        <button class="dock-item" type="button" data-route="scan">
          <span class="dock-icon"><img src="./assets/ui/dock-scan.png" alt="" /></span>
          <span>扫码</span>
        </button>
      </nav>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
